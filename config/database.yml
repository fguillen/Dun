default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_development
    <<: *default
    database: dun_development
  cache:
    <<: *primary_development
    database: dun_development_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_development
    database: dun_development_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_development
    database: dun_development_cable
    migrations_paths: db/cable_migrate

test:
  primary: &primary_test
    <<: *default
    database: dun_test
  cache:
    <<: *primary_test
    database: dun_test_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_test
    database: dun_test_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_test
    database: dun_test_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    database: dun_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: dun_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: dun_production_cable
    migrations_paths: db/cable_migrate
